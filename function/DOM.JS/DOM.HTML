<!DOCTYPE html>
<html lang="en">
<head>
    <title>TodoApp</title>
</head>
<body>

    <input class="inp" type="text" placeholder="Enter your task">
    <button class="btn">ADD</button>

    <ul class="taskList">
        <li class="taskName">
            Dancing
            <span>
                <button>UP</button>
                <button>DOWN</button>
                <button>DEL</button>
            </span>
        </li>
    </ul>

    <script>
        const inp = document.querySelector('.inp');
        console.log(inp);

        const btn = document.querySelector('.btn');
        const taskList = document.querySelector('.taskList');

        btn.addEventListener('click', () => {
            console.log(inp.value);

            let task = inp.value;
            let li = document.createElement('li');
            li.classList.add('taskName');
            li.innerText = task;

            taskList.appendChild(li);

            inp.value = "";
        });
    </script>

</body>
</html>
